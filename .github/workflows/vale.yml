---
name: "vale"

on: [pull_request]

jobs:
  vale:
    name: vale
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install docutils
        run: sudo apt-get install -y docutils

      - name: Run vale checks
        uses: errata-ai/vale-action@v2.1.1
