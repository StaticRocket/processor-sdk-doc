---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    groups:
      ci:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "docker"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "build"
    groups:
      pip:
        patterns:
          - "*"
