---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: ".github/workflows"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    groups:
      ci:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "docker/requirements.txt"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    groups:
      pip:
        patterns:
          - "*"
